<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" font-family="ui-monospace, 'SF Mono', Menlo, 'Cascadia Mono', Consolas, monospace">
  <title>cc-hud — Claude Code statusline</title>
  <desc>Animated preview of cc-hud showing model, context bar, agents, rate limits, and per-backend balance for Claude, GLM, DeepSeek, and MiniMax.</desc>

  <defs>
    <linearGradient id="titleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181825"/>
      <stop offset="1" stop-color="#11111b"/>
    </linearGradient>
    <filter id="termShadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
    </filter>

    <!-- Per-row bar reveal: each rect's width animates from 0 to (percent * bar_px / 100). -->
    <clipPath id="barC"><rect x="228" y="122" width="0" height="16"><animate attributeName="width" from="0" to="13.6" begin="0.25s" dur="1.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="barG"><rect x="220" y="146" width="0" height="16"><animate attributeName="width" from="0" to="32.8" begin="0.55s" dur="1.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="barD"><rect x="284" y="170" width="0" height="16"><animate attributeName="width" from="0" to="16.0" begin="0.85s" dur="1.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="barM"><rect x="244" y="194" width="0" height="16"><animate attributeName="width" from="0" to="10.4" begin="1.15s" dur="1.4s" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- Terminal window -->
  <g filter="url(#termShadow)">
    <rect x="24" y="24" width="852" height="242" rx="14" fill="#1e1e2e" stroke="#313244"/>
    <path d="M24 38 a14 14 0 0 1 14-14 h824 a14 14 0 0 1 14 14 v22 h-852 z" fill="url(#titleBg)"/>
    <line x1="24" y1="60" x2="876" y2="60" stroke="#313244"/>

    <circle cx="44" cy="42" r="6" fill="#f38ba8"/>
    <circle cx="62" cy="42" r="6" fill="#f9e2af"/>
    <circle cx="80" cy="42" r="6" fill="#a6e3a1"/>

    <text x="450" y="46" font-size="11" fill="#7f849c" text-anchor="middle" font-weight="500" letter-spacing="0.5"><tspan fill="#cba6f7" font-weight="600">cc-hud</tspan> · claude code statusline</text>

    <rect x="800" y="33" width="60" height="18" rx="9" fill="none" stroke="#313244"/>
    <text x="830" y="46" font-size="10" fill="#585b70" text-anchor="middle" letter-spacing="0.7">v0.5.0</text>
  </g>

  <!-- Subtitle + stable-launcher pill -->
  <g>
    <text x="48" y="84" font-size="11" font-style="italic" fill="#585b70">CC-HUD v0.5.0 — <tspan fill="#cba6f7" font-weight="600" font-style="normal">all backends</tspan> · model · context · agents · rate limits · balance</text>
    <rect x="600" y="73" width="106" height="15" rx="4" fill="#b4befe" fill-opacity="0.08" stroke="#b4befe" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.25;0.6;0.25" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="653" y="84" font-size="10" fill="#b4befe" text-anchor="middle" letter-spacing="0.6" font-style="normal">stable launcher</text>
  </g>

  <!-- Body rows -->
  <g font-size="13">

    <!-- Claude -->
    <text x="48" y="135" fill="#7f849c" font-weight="500">Claude</text>
    <text x="140" y="135"><tspan fill="#6c7086">[</tspan><tspan fill="#89b4fa" font-weight="600">Opus 4.7</tspan><tspan fill="#6c7086">]</tspan></text>
    <text x="228" y="135" fill="#45475a">░░░░░░░░░░</text>
    <text x="228" y="135" fill="#a6e3a1" clip-path="url(#barC)">██████████</text>
    <text x="320" y="135" xml:space="preserve"><tspan fill="#a6e3a1">17%</tspan> <tspan fill="#6c7086">(1M)</tspan>  <tspan fill="#6c7086">│</tspan>  <tspan fill="#94e2d5">◐</tspan> <tspan fill="#cdd6f4">explore</tspan> <tspan fill="#6c7086">[haiku]</tspan>  <tspan fill="#6c7086">│</tspan>  <tspan fill="#6c7086">5h:</tspan><tspan fill="#f9e2af">62%</tspan> <tspan fill="#6c7086">(</tspan><tspan fill="#b4befe">3.1h</tspan><tspan fill="#6c7086">)</tspan>  <tspan fill="#6c7086">│</tspan>  <tspan fill="#6c7086">7d:</tspan><tspan fill="#a6e3a1">8%</tspan> <tspan fill="#6c7086">(</tspan><tspan fill="#74c7ec">6.4d</tspan><tspan fill="#6c7086">)</tspan></text>

    <!-- GLM -->
    <text x="48" y="159" fill="#7f849c" font-weight="500">GLM</text>
    <text x="140" y="159"><tspan fill="#6c7086">[</tspan><tspan fill="#89b4fa" font-weight="600">GLM 5.2</tspan><tspan fill="#6c7086">]</tspan></text>
    <text x="220" y="159" fill="#45475a">░░░░░░░░░░</text>
    <text x="220" y="159" fill="#a6e3a1" clip-path="url(#barG)">██████████</text>
    <text x="312" y="159" xml:space="preserve"><tspan fill="#a6e3a1">41%</tspan> <tspan fill="#6c7086">(1M)</tspan>  <tspan fill="#6c7086">│</tspan>  <tspan fill="#94e2d5">¥88.50</tspan></text>

    <!-- DeepSeek -->
    <text x="48" y="183" fill="#7f849c" font-weight="500">DeepSeek</text>
    <text x="140" y="183"><tspan fill="#6c7086">[</tspan><tspan fill="#89b4fa" font-weight="600">DeepSeek V4 Pro</tspan><tspan fill="#6c7086">]</tspan></text>
    <text x="284" y="183" fill="#45475a">░░░░░░░░░░</text>
    <text x="284" y="183" fill="#a6e3a1" clip-path="url(#barD)">██████████</text>
    <text x="376" y="183" xml:space="preserve"><tspan fill="#a6e3a1">20%</tspan> <tspan fill="#6c7086">(1M)</tspan>  <tspan fill="#6c7086">│</tspan>  <tspan fill="#94e2d5">¥13.44</tspan></text>

    <!-- MiniMax -->
    <text x="48" y="207" fill="#7f849c" font-weight="500">MiniMax</text>
    <text x="140" y="207"><tspan fill="#6c7086">[</tspan><tspan fill="#89b4fa" font-weight="600">MiniMax M3</tspan><tspan fill="#6c7086">]</tspan></text>
    <text x="244" y="207" fill="#45475a">░░░░░░░░░░</text>
    <text x="244" y="207" fill="#a6e3a1" clip-path="url(#barM)">██████████</text>
    <text x="336" y="207" xml:space="preserve"><tspan fill="#a6e3a1">13%</tspan>  <tspan fill="#6c7086">│</tspan>  <tspan fill="#6c7086">5h:</tspan><tspan fill="#a6e3a1">17%</tspan> <tspan fill="#6c7086">(</tspan><tspan fill="#f2cdcd">1.1h</tspan><tspan fill="#6c7086">)</tspan>  <tspan fill="#6c7086">│</tspan>  <tspan fill="#6c7086">7d:</tspan><tspan fill="#a6e3a1">2%</tspan> <tspan fill="#6c7086">(</tspan><tspan fill="#74c7ec">6.4d</tspan><tspan fill="#6c7086">)</tspan></text>
  </g>

  <!-- Footer -->
  <g font-size="10.5" fill="#585b70">
    <line x1="48" y1="232" x2="852" y2="232" stroke="#313244" stroke-dasharray="3 3"/>
    <text x="48" y="250" xml:space="preserve"><tspan fill="#94e2d5">●</tspan> zero dependencies   <tspan fill="#94e2d5">●</tspan> pure Node.js   <tspan fill="#94e2d5">●</tspan> crash-free on Windows   <tspan fill="#94e2d5">●</tspan> 95 tests   <tspan fill="#94e2d5">●</tspan> stable-path launcher</text>
  </g>

</svg>
